<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل المستشفيات الخاصة - مصر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2333;
    --border: #30363d;
    --accent: #2f81f7;
    --accent2: #7c4dff;
    --green: #3fb950;
    --text: #e6edf3;
    --muted: #8b949e;
    --hot: #f78166;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #1a1f35 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-title span.pulse {
    width: 10px; height: 10px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 40px 10px 14px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Stats bar */
  .stats-bar {
    padding: 10px 16px;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .stats-bar span { color: var(--accent); font-weight: 700; }

  /* Main content */
  .content { padding: 12px 16px; }

  /* Gov section */
  .gov-section { margin-bottom: 8px; }

  .gov-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    user-select: none;
  }

  .gov-header.collapsed { border-radius: 10px; margin-bottom: 8px; }

  .gov-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .gov-badge {
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .gov-toggle {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
  }

  .gov-toggle.open { transform: rotate(180deg); }

  /* Hospital cards */
  .hospitals-list {
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .hospital-card {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px;
    transition: background 0.15s;
  }

  .hospital-card:last-child { border-bottom: none; }
  .hospital-card:hover { background: #1f2937; }

  .hospital-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .hospital-address {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 4px;
  }

  /* Phone numbers */
  .phones {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 6px;
  }

  .phone-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(47, 129, 247, 0.12);
    border: 1px solid rgba(47, 129, 247, 0.3);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--accent);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
    direction: ltr;
  }

  .phone-btn:hover, .phone-btn:active {
    background: var(--accent);
    color: white;
    transform: scale(0.97);
  }

  .phone-btn.hotline {
    background: rgba(247, 129, 102, 0.12);
    border-color: rgba(247, 129, 102, 0.3);
    color: var(--hot);
  }

  .phone-btn.hotline:hover, .phone-btn.hotline:active {
    background: var(--hot);
    color: white;
  }

  .phone-btn.whatsapp {
    background: rgba(63, 185, 80, 0.12);
    border-color: rgba(63, 185, 80, 0.3);
    color: var(--green);
  }

  .phone-btn.whatsapp:hover, .phone-btn.whatsapp:active {
    background: var(--green);
    color: white;
  }

  .phone-icon { font-size: 13px; }

  /* Tags */
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
  }

  .tag-web {
    background: rgba(124, 77, 255, 0.15);
    color: #9c6dff;
    border: 1px solid rgba(124, 77, 255, 0.2);
  }

  .tag-email {
    background: rgba(63, 185, 80, 0.1);
    color: var(--green);
    border: 1px solid rgba(63, 185, 80, 0.2);
    text-decoration: none;
  }

  .tag-note {
    background: rgba(255, 255, 255, 0.05);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .label-hotline { font-size: 9px; opacity: 0.7; }

  /* Done state */
  .hospital-card.done {
    background: rgba(63, 185, 80, 0.08);
    border-right: 3px solid var(--green);
    opacity: 0.75;
  }

  .hospital-card.done .hospital-name {
    color: var(--green);
    text-decoration: line-through;
    text-decoration-color: rgba(63,185,80,0.5);
  }

  .done-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.05);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .done-btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(63,185,80,0.1);
  }

  .hospital-card.done .done-btn {
    background: rgba(63,185,80,0.15);
    border: 1px solid var(--green);
    color: var(--green);
  }

  .done-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(63,185,80,0.15);
    border: 1px solid rgba(63,185,80,0.3);
    border-radius: 6px;
    padding: 2px 8px;
    color: var(--green);
    font-size: 11px;
    font-weight: 700;
    margin-right: 6px;
  }

  .progress-bar-wrap {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .progress-label span { color: var(--green); font-weight: 700; }

  .progress-track {
    background: var(--border);
    border-radius: 10px;
    height: 6px;
    overflow: hidden;
  }

  .progress-fill {
    background: linear-gradient(90deg, var(--green), #52d975);
    height: 100%;
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .reset-btn {
    float: left;
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    padding: 0;
    text-decoration: underline;
  }

  .reset-btn:hover { color: var(--hot); }
</style>
</head>

let currentFilter = 'all';

function groupByGov(list) {
  const groups = {};
  list.forEach(h => {
    if (!groups[h.gov]) groups[h.gov] = [];
    groups[h.gov].push(h);
  });
  return groups;
}

function renderPhones(h) {
  let html = '<div class="phones">';
  if (h.phones) {
    h.phones.forEach(p => {
      html += `<a href="tel:${p}" class="phone-btn"><span class="phone-icon">📞</span>${p}</a>`;
    });
  }
  if (h.hotline) {
    html += `<a href="tel:${h.hotline}" class="phone-btn hotline"><span class="phone-icon">🔴</span>${h.hotline} <span class="label-hotline">ساخن</span></a>`;
  }
  if (h.whatsapp) {
    const num = h.whatsapp.replace(/\D/g, '');
    html += `<a href="https://wa.me/2${num}" target="_blank" class="phone-btn whatsapp"><span class="phone-icon">💬</span>${h.whatsapp}</a>`;
  }
  html += '</div>';
  return html;
}

function getHospitalId(h) {
  return 'done_' + h.name.replace(/\s+/g, '_');
}

function isDone(h) {
  return localStorage.getItem(getHospitalId(h)) === '1';
}

function toggleDone(name) {
  const h = hospitals.find(x => x.name === name);
  if (!h) return;
  const key = getHospitalId(h);
  if (localStorage.getItem(key) === '1') {
    localStorage.removeItem(key);
  } else {
    localStorage.setItem(key, '1');
  }
  updateProgress();
  // update just this card
  const card = document.querySelector(`[data-name="${CSS.escape(name)}"]`);
  if (card) {
    const done = isDone(h);
    card.classList.toggle('done', done);
    const btn = card.querySelector('.done-btn');
    if (btn) btn.innerHTML = done ? '✅ تم الاتصال' : '○ علّم كمكتمل';
  }
}

function updateProgress() {
  const total = hospitals.length;
  const done = hospitals.filter(h => isDone(h)).length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function resetAll() {
  if (!confirm('هتمسح كل العلامات — متأكد؟')) return;
  hospitals.forEach(h => localStorage.removeItem(getHospitalId(h)));
  updateProgress();
  filterHospitals();
}

function renderHospital(h) {
  let tags = '';
  if (h.web) tags += `<a href="https://${h.web}" target="_blank" class="tag tag-web">🌐 ${h.web}</a>`;
  if (h.email) tags += `<a href="mailto:${h.email}" class="tag tag-email">✉️ ${h.email}</a>`;
  if (h.note) tags += `<span class="tag tag-note">ℹ️ ${h.note}</span>`;

  const done = isDone(h);
  return `
    <div class="hospital-card ${done ? 'done' : ''}" data-name="${h.name}">
      <div class="hospital-name">${done ? '<span class="done-badge">✅ تم</span>' : ''}${h.name}</div>
      <div class="hospital-address">📍 ${h.address}</div>
      ${renderPhones(h)}
      ${tags ? `<div class="tags">${tags}</div>` : ''}
      <button class="done-btn" onclick="toggleDone('${h.name.replace(/'/g, "\\'")}')">
        ${done ? '✅ تم الاتصال' : '○ علّم كمكتمل'}
      </button>
    </div>`;
}

function render(filtered) {
  const container = document.getElementById('mainContent');
  const count = document.getElementById('countDisplay');
  count.textContent = filtered.length;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">🔍 لا توجد نتائج</div>';
    return;
  }

  const groups = groupByGov(filtered);
  let html = '';
  Object.entries(groups).forEach(([gov, list]) => {
    html += `
      <div class="gov-section">
        <div class="gov-header" onclick="toggleGov(this)">
          <div class="gov-name">🏙️ ${gov} <span class="gov-badge">${list.length}</span></div>
          <span class="gov-toggle open">▼</span>
        </div>
        <div class="hospitals-list">
          ${list.map(renderHospital).join('')}
        </div>
      </div>`;
  });
  container.innerHTML = html;
}

function toggleGov(header) {
  const list = header.nextElementSibling;
  const icon = header.querySelector('.gov-toggle');
  if (list.style.display === 'none') {
    list.style.display = '';
    icon.classList.add('open');
    header.classList.remove('collapsed');
  } else {
    list.style.display = 'none';
    icon.classList.remove('open');
    header.classList.add('collapsed');
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterHospitals();
}

function filterHospitals() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = hospitals;
  if (currentFilter !== 'all') {
    filtered = filtered.filter(h => h.gov.includes(currentFilter));
  }
  if (q) {
    filtered = filtered.filter(h =>
      h.name.toLowerCase().includes(q) ||
      h.gov.toLowerCase().includes(q) ||
      (h.address && h.address.toLowerCase().includes(q)) ||
      (h.phones && h.phones.some(p => p.includes(q)))
    );
  }
  render(filtered);
}

render(hospitals);
updateProgress();
</script>
